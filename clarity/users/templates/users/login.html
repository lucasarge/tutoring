{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="flex items-center min-h-[calc(100vh-140px)] drop-shadow-md drop-shadow-mauve-900">
    <div class="w-lg mx-auto bg-white text-black p-4 rounded-3xl">
        <h1 class="text-center text-4xl">Login</h1>
        <form  class="" action="/users/login/" method="post">
            {% csrf_token %}
            <div class="grid sm:grid-cols-2 py-2 sm:py-4 gap-y-2">

                {% for field in form %}
                <div class="flex gap-1">
                    <div>
                        {{ field.label }}:  
                        {{ field.errors }}
                    </div>
                      
                    {% if field.help_text %}
                
                    <div class="relative group flex">
                        <span class="cursor-pointer">&#128712;</span>
                        <div class="hidden group-hover:block absolute bottom-full left-1/2 -translate-x-1/2">
                            <div class="bg-gray-200 text-black text-xs rounded-lg px-3 py-2 shadow-lg w-64 text-center">
                                {{ field.help_text }}
                            </div>
                            <div class="w-3 h-3 bg-gray-200 text-white rotate-45 absolute left-1/2 -translate-x-1/2 -bottom-1"></div>
                        </div>
                    </div>
                
                    {% endif %}
                </div>
                {{ field }}
                
            
            {% endfor %}
            </div>
            <div class="grid place-items-center">
                <button class="cursor-pointer bg-third px-8 py-2 border-2 rounded-2xl text-white" type="submit">Continue</button>
            </div>
        </form>
        <h6 class="text-xs text-center underline pt-2"><a href="/users/register/">I do not have an account.</a></h6>
    </div>
</div>
{% endblock %}
