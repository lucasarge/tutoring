{% extends "layout.html" %}

{% block title %}Calendar{% endblock %}

{% block script %}
{% load static %}
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>
    <script src="{% static 'js/calendar.js' %}"></script>
{% endblock %}

{% block content %}
    <div class="flex items-center min-h-[calc(100vh-140px)] drop-shadow-md drop-shadow-mauve-900">
        <div class="w-4xl mx-auto bg-white text-black p-4 rounded-3xl text-center">
            <div class="calendar-wrapper">
                <div id='calendar'></div>
            </div>
        </div>
    </div>
{% endblock %}
